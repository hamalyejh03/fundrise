# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# FIX: serialize Java LocalDateTime as ISO-8601 strings (e.g. "2024-12-31T00:00:00")
# instead of numeric arrays. Without this, frontend date helpers (formatDate,
# formatRelativeDate) receive [2024,12,31,...] which new Date() cannot parse.
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Local image storage (fallback when Cloudinary is not configured)
# app.uploads.dir: where files are saved on disk (relative to working directory)
# app.uploads.base-url: base URL prepended to /api/uploads/... paths returned to the frontend
app.uploads.dir=${UPLOADS_DIR:uploads}
app.uploads.base-url=${APP_BASE_URL:http://localhost:8080}

